name: Build & Release

# 태그(vX.Y.Z) 푸시 → mac/win/linux 설치파일 빌드 후 GitHub Release에 첨부.
# 수동 실행(workflow_dispatch) → 설치파일을 아티팩트로만 업로드(릴리스 생성 안 함).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # 태그 빌드 시 Release 생성/첨부

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: '--mac'
            artifacts: |
              release/*.dmg
          - os: windows-latest
            flag: '--win'
            artifacts: |
              release/*.exe
          - os: ubuntu-latest
            flag: '--linux'
            artifacts: |
              release/*.AppImage
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundle (electron-vite)
        run: npm run build

      - name: Package (electron-builder, 무서명)
        run: npx electron-builder ${{ matrix.flag }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CCUsageWidget-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: warn

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
